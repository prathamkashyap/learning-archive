name: Docs check

on:
  push:
  pull_request:

jobs:
  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress README.md git/**/*.md github/**/*.md markdown/**/*.md IMPLEMENTATION_PLAN.md WALKTHROUGH.md
